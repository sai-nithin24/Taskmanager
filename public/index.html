<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="TaskBoard" />
  <title>TaskBoard</title>
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>

<body>

  <!-- HEADER  -->
  <header class="header" role="banner">
    <div class="header__inner">
      <div class="header__logo">
        Task<span>Board</span>
        <span class="header__sprint" aria-label="Current sprint">weekly tasks</span>
      </div>
      <time class="header__clock" id="clock" aria-live="off">--:--</time>
    </div>
  </header>

  <!--MAIN  -->
  <main class="main" role="main">

    <!-- Stats bar -->
    <section class="stats" aria-label="Task statistics">
      <div class="stats__item">
        <div class="stats__value stats__value--total" id="stat-total">—</div>
        <div class="stats__label">Total tasks</div>
      </div>
      <div class="stats__item">
        <div class="stats__value stats__value--pending" id="stat-pending">—</div>
        <div class="stats__label">In progress</div>
      </div>
      <div class="stats__item">
        <div class="stats__value stats__value--completed" id="stat-completed">—</div>
        <div class="stats__label">Completed</div>
      </div>

      <!-- SVG ring -->
      <div class="stats__ring" aria-label="Completion percentage">
        <svg width="56" height="56" role="img" aria-hidden="true">
          <circle cx="28" cy="28" r="22" fill="none" stroke="var(--border)" stroke-width="4" />
          <circle id="ring-fill" cx="28" cy="28" r="22" fill="none" stroke="var(--accent)" stroke-width="4"
            stroke-linecap="round" stroke-dasharray="138.23" stroke-dashoffset="138.23"
            style="transition: stroke-dashoffset .6s ease, stroke .4s;" />
        </svg>
        <div class="stats__pct" id="stat-pct" style="color:var(--accent);">0%</div>
        <div class="stats__label" style="margin-top:4px;">complete</div>
      </div>
    </section>

    <!-- Add Task Form -->
    <section aria-label="Add a new task">
      <div class="form-card" id="form-card">
        <div class="form-card__label">New Task</div>
        <div class="form-card__row">

          <!-- Text input -->
          <div class="task-input-wrap">
            <input type="text" id="task-input" class="task-input" placeholder="What needs to get done?" maxlength="120"
              aria-label="Task title" aria-describedby="input-err" autocomplete="off" />
            <div class="task-input__meta">
              <span id="input-err" class="task-input__err" role="alert" aria-live="polite"></span>
              <span id="input-count" class="task-input__count">120 left</span>
            </div>
          </div>

          <!-- Priority pills -->
          <div class="priority-group" role="group" aria-label="Task priority">
            <button class="priority-pill" data-priority="high" type="button" aria-pressed="false">High</button>
            <button class="priority-pill active-medium" data-priority="medium" type="button"
              aria-pressed="true">Med</button>
            <button class="priority-pill" data-priority="low" type="button" aria-pressed="false">Low</button>
          </div>

          <!-- Submit -->
          <button class="btn-add" id="btn-add" type="button" aria-label="Add task">
            Add Task
          </button>
        </div>
      </div>
    </section>

    <!-- Filter tabs -->
    <nav aria-label="Filter tasks">
      <div class="filters">
        <button class="filter-btn active" data-filter="all" type="button">
          All <span class="filter-btn__badge" id="badge-all">—</span>
        </button>
        <button class="filter-btn" data-filter="pending" type="button">
          Pending <span class="filter-btn__badge" id="badge-pending">—</span>
        </button>
        <button class="filter-btn" data-filter="completed" type="button">
          Completed <span class="filter-btn__badge" id="badge-completed">—</span>
        </button>
      </div>
    </nav>

    <!-- Task list -->
    <section aria-label="Task list" aria-live="polite">
      <div class="task-list" id="task-list">
        <div class="spinner"></div>
      </div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer class="footer" role="contentinfo">
  &copy; 2026 TaskBoard
  </footer>

  <script src="assets/js/app.js"></script>
</body>

</html>
